services:
  - type: web
    name: gwf-overlay-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn overlay_server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OUTPUT_FOLDER
        value: /tmp/branded_images
      - key: PUBLIC_BASE_URL
        value: https://gwf-overlay-server.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.11
    plan: free
